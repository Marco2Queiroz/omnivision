<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Abstract Background Element -->
<div class="fixed inset-0 z-0 data-stream-bg" data-alt="high-tech digital data flow with glowing cyan circuit lines and deep navy blue background in a futuristic cinematic style"></div>
<!-- Decorative Radial Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/5 blur-[120px] z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/5 blur-[120px] z-0"></div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="glass-panel p-10 lg:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<div class="flex items-center justify-center mb-4">
<div class="w-12 h-12 bg-primary-container flex items-center justify-center rounded-lg shadow-[0_0_20px_rgba(0,242,255,0.4)]">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-primary-container glow-text mb-2">
                    OMNIVISION
                </h1>
<p class="font-label text-outline text-[10px] uppercase tracking-[0.3em] font-bold">
                    Executive Command Access
                </p>
</div>
<!-- Access Form -->
<form class="w-full space-y-8" onsubmit="return false;">
<!-- Identity Input -->
<div class="space-y-2 group">
<label class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest font-bold block ml-1">
                        Corporate Identifier
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border-none border-b border-outline-variant focus:border-primary-container focus:ring-0 text-on-surface pl-12 py-4 text-sm transition-all duration-300 placeholder:text-outline/40" placeholder="executive@omnivision.global" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[1px] bg-primary-container transition-all duration-500 group-focus-within:w-full shadow-[0_0_8px_rgba(0,242,255,0.8)]"></div>
</div>
</div>
<!-- Primary Action -->
<div class="space-y-4 pt-2">
<button class="w-full bg-gradient-to-r from-primary-container to-tertiary-fixed-dim text-on-primary font-headline font-extrabold text-xs uppercase tracking-widest py-5 px-6 rounded-lg transition-all duration-300 hover:brightness-110 active:scale-[0.98] shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                        Request Magic Link
                    </button>
<div class="flex items-center gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="text-[9px] font-label text-outline uppercase tracking-tighter">Secure Protocol V.4.2</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<button class="w-full bg-surface-container-highest/30 border border-outline-variant/20 text-on-surface font-label font-semibold text-[10px] uppercase tracking-wider py-4 px-6 rounded-lg hover:bg-surface-container-highest/50 transition-colors">
                        SAML Single Sign-On
                    </button>
</div>
</form>
<!-- Metadata/Footer -->
<footer class="mt-12 w-full">
<div class="grid grid-cols-2 gap-4 text-center">
<div class="p-3 bg-surface-container-low/50 border border-outline-variant/10">
<p class="text-[9px] text-outline uppercase tracking-widest mb-1">Encrypted</p>
<p class="text-[10px] font-bold text-tertiary-fixed-dim">AES-256</p>
</div>
<div class="p-3 bg-surface-container-low/50 border border-outline-variant/10">
<p class="text-[9px] text-outline uppercase tracking-widest mb-1">Station</p>
<p class="text-[10px] font-bold text-tertiary-fixed-dim">NODE-741</p>
</div>
</div>
<div class="mt-8 text-center">
<a class="text-[10px] text-outline hover:text-primary-container transition-colors tracking-widest uppercase font-bold" href="#">
                        Institutional Support Policy
                    </a>
</div>
</footer>
</div>
<!-- System Status Bar -->
<div class="mt-8 flex justify-between items-center px-4">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse shadow-[0_0_5px_rgba(0,242,255,1)]"></div>
<span class="text-[9px] font-bold text-outline tracking-widest uppercase">System Online</span>
</div>
<div class="flex items-center gap-4">
<span class="text-[9px] font-bold text-outline tracking-widest uppercase">Latency: 12ms</span>
<span class="text-[9px] font-bold text-outline tracking-widest uppercase">Region: US-EAST</span>
</div>
</div>
</main>
<!-- Scanner Line (Signature Technical Interaction) -->
<div class="fixed top-0 left-0 w-full h-[2px] bg-primary-container/20 shadow-[0_0_10px_rgba(0,242,255,0.3)] z-50 pointer-events-none opacity-20"></div>
